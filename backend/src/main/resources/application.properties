flytek.api.app-id=${FLYTEK_APP_ID:}
flytek.api.key=${FLYTEK_API_KEY:}
flytek.api.client-secret=${FLYTEK_CLIENT_SECRET:}

# 用 origin patterns 支持任意端口的 localhost / 127.0.0.1（覆盖 Flutter Web 随机端口、devtools）
# 生产请通过 APP_CORS_ALLOWED_ORIGIN_PATTERNS 显式覆盖
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}

