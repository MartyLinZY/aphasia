llm.audio.url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
llm.audio.model=qwen3.5-omni-plus
llm.audio.timeout-seconds=120

baidu.api.app-id=${BAIDU_APP_ID:}
baidu.api.key=${BAIDU_API_KEY:}
